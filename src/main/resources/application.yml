server:
  port: 8080
  forward-headers-strategy: framework

spring:
  application:
    name: api-gateway

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}

  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: ${AUTH_SERVICE_URL:http://auth-service.respondlyai.svc.cluster.local:8080}
          predicates:
            - Path=/api/v1/auth/**
            
        - id: auth-docs
          uri: ${AUTH_SERVICE_URL:http://auth-service.respondlyai.svc.cluster.local:8080}
          predicates:
            - Path=/swagger-docs/auth
          filters:
            - SetPath=/v3/api-docs

        - id: org-service
          uri: ${ORG_SERVICE_URL:http://org-service.respondlyai.svc.cluster.local:8080}
          predicates:
            - Path=/api/v1/org/**

        - id: org-docs
          uri: ${ORG_SERVICE_URL:http://org-service.respondlyai.svc.cluster.local:8080}
          predicates:
            - Path=/swagger-docs/org
          filters:
            - SetPath=/v3/api-docs

application:
  security:
    jwt:
      secret-key: ${JWT_SECRET_KEY:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
    public-paths: /api/v1/auth, /actuator/health, /api/docs, /swagger-ui, /v3/api-docs, /swagger-docs/auth, /swagger-docs/org

management:
  endpoints:
    web:
      exposure:
        include: health, metrics

logging:
  level:
    root: INFO
    in.respondlyai: DEBUG
    org.springframework.cloud.gateway: DEBUG
    org.springframework.security: WARN
    org.springframework.web.server.adapter.HttpWebHandlerAdapter: WARN

springdoc:
  swagger-ui:
    path: /api/docs
    urls:
      - name: Auth API
        url: /swagger-docs/auth
      - name: Organization API
        url: /swagger-docs/org

