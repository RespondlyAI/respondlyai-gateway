server:
  port: 8080
  forward-headers-strategy: framework

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      globalcors:
        add-to-simple-url-handler-mapping: true
        corsConfigurations:
          '[/**]':
            allowedOriginPatterns: "*"
            allowedMethods: "*"
            allowedHeaders: "*"
            allowCredentials: true
      routes:
        - id: auth-service
          uri: http://auth-service:8080
          predicates:
            - Path=/api/v1/auth/**
        - id: org-service
          uri: http://org-service:8080
          predicates:
            - Path=/api/v1/org/**
        - id: auth-docs
          uri: http://auth-service:8080
          predicates:
            - Path=/swagger-docs/auth
          filters:
            - RewritePath=/swagger-docs/auth, /v3/api-docs
        - id: org-docs
          uri: http://org-service:8080
          predicates:
            - Path=/swagger-docs/org
          filters:
            - RewritePath=/swagger-docs/org, /v3/api-docs

application:
  security:
    jwt:
      secret-key: ${JWT_SECRET_KEY:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
    public-paths: /api/v1/auth, /actuator/health, /api/docs, /swagger-ui, /v3/api-docs, /swagger-docs/auth, /swagger-docs/org

management:
  endpoints:
    web:
      exposure:
        include: health, metrics

logging:
  level:
    root: INFO
    in.respondlyai: DEBUG
    org.springframework.cloud.gateway: DEBUG

springdoc:
  swagger-ui:
    path: /api/docs
    urls:
      - name: Auth API
        url: /swagger-docs/auth
      - name: Organization API
        url: /swagger-docs/org
